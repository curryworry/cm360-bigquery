<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    body { margin: 0; font-family: "IBM Plex Sans", "Segoe UI", sans-serif; background: #f3f0e8; }
    .wrap { max-width: 480px; margin: 80px auto; padding: 16px; }
    .card { background: #fffef8; border: 1px solid #d8d4c8; border-radius: 12px; padding: 20px; }
    h1 { margin-top: 0; }
    label { display: block; margin-bottom: 6px; }
    input { width: 100%; box-sizing: border-box; border: 1px solid #d8d4c8; border-radius: 8px; padding: 10px; }
    button { margin-top: 12px; border: none; border-radius: 8px; padding: 10px 14px; background: #aa3a1e; color: #fff; font-weight: 600; cursor: pointer; }
    .error { margin-top: 10px; color: #7a1f1f; background: #fff2f0; border: 1px solid #e8a19a; border-radius: 8px; padding: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Internal Access</h1>
      <form method="post" action="/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
        <button type="submit">Sign in</button>
      </form>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
    </div>
  </div>
</body>
</html>
